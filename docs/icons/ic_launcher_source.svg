<?xml version="1.0" encoding="utf-8"?>
<!--
  MedLog app icon — standard SVG source for PNG export.
  Canvas: 108×108 dp (Android adaptive-icon convention).
  Safe zone guaranteed visible: 18–90 dp.
  Style: silver clipboard + ruled notepad + red/blue capsule pill.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="108" height="108" viewBox="0 0 108 108">
  <defs>
    <linearGradient id="gBg" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#FAFAFA"/>
      <stop offset="1"   stop-color="#E8E8E8"/>
    </linearGradient>
    <linearGradient id="gBoard" x1="22" y1="22" x2="86" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#D8D8D8"/>
      <stop offset="0.6" stop-color="#BBBBBB"/>
      <stop offset="1"   stop-color="#999999"/>
    </linearGradient>
    <linearGradient id="gClip" x1="40" y1="12" x2="68" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#EEEEEE"/>
      <stop offset="0.35" stop-color="#888888"/>
      <stop offset="0.65" stop-color="#AAAAAA"/>
      <stop offset="1"    stop-color="#D0D0D0"/>
    </linearGradient>
    <linearGradient id="gPillRed" x1="28" y1="67" x2="54" y2="89" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#FFCDD2"/>
      <stop offset="0.45" stop-color="#F44336"/>
      <stop offset="1"    stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="gPillBlue" x1="54" y1="67" x2="80" y2="89" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#BBDEFB"/>
      <stop offset="0.45" stop-color="#42A5F5"/>
      <stop offset="1"    stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="gPillShine" x1="39" y1="61" x2="69" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.60"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="108" height="108" fill="url(#gBg)"/>

  <!-- Clipboard board (silver rounded rect) -->
  <path d="M22,27 Q22,22 27,22 L81,22 Q86,22 86,27 L86,96 Q86,100 81,100 L27,100 Q22,100 22,96 Z"
        fill="url(#gBoard)"/>

  <!-- Back paper (depth shadow) -->
  <path d="M27,43 L81,43 L81,98 L27,98 Z" fill="#E4E4E4"/>

  <!-- Front paper (white) -->
  <path d="M25,41 Q25,39 27,39 L81,39 Q83,39 83,41 L83,97 L25,97 Z" fill="#FFFFFF"/>

  <!-- Red margin line -->
  <rect x="34" y="43" width="1.4" height="53" fill="#FFB3B3"/>

  <!-- Blue ruled lines -->
  <rect x="29" y="50"   width="50" height="1.2" fill="#BBDEFB"/>
  <rect x="29" y="57"   width="50" height="1.2" fill="#BBDEFB"/>
  <rect x="29" y="64"   width="50" height="1.2" fill="#BBDEFB"/>

  <!-- DATE label bar -->
  <rect x="37" y="45.5" width="18" height="1.5" fill="#757575"/>
  <!-- DATE value underline -->
  <rect x="57" y="46"   width="13" height="1"   fill="#CCCCCC"/>

  <!-- PATIENT label bar -->
  <rect x="37" y="52"   width="26" height="1.5" fill="#757575"/>
  <!-- PATIENT value underline -->
  <rect x="65" y="52.5" width="5"  height="1"   fill="#CCCCCC"/>

  <!-- LOG label bar -->
  <rect x="37" y="58.5" width="13" height="1.5" fill="#757575"/>

  <!-- AM checkbox (hollow square) -->
  <rect x="68" y="44" width="5" height="5" fill="none" stroke="#9E9E9E" stroke-width="1.2"/>
  <!-- AM text bar -->
  <rect x="74.5" y="45" width="3.5" height="3" fill="#9E9E9E"/>

  <!-- PM checkbox (hollow square) -->
  <rect x="68" y="51" width="5" height="5" fill="none" stroke="#9E9E9E" stroke-width="1.2"/>
  <!-- PM text bar -->
  <rect x="74.5" y="52" width="3.5" height="3" fill="#9E9E9E"/>

  <!-- Metal clip body -->
  <path d="M40,15 Q40,12 43,12 L65,12 Q68,12 68,15 L68,40 L40,40 Z" fill="url(#gClip)"/>

  <!-- Spring coil details -->
  <rect x="43" y="12"   width="22" height="1.5" fill="#555555"/>
  <rect x="44" y="13.5" width="20" height="1.5" fill="#999999"/>

  <!-- Pill – left red half (arc sweeps around left cap) -->
  <path d="M54,67 L39,67 A11,11 0 0,0 39,89 L54,89 Z" fill="url(#gPillRed)"/>

  <!-- Pill – right blue half -->
  <path d="M54,67 L69,67 A11,11 0 0,1 69,89 L54,89 Z" fill="url(#gPillBlue)"/>

  <!-- Pill centre seam (white divider) -->
  <rect x="53.1" y="66" width="1.8" height="24" fill="#FFFFFF"/>

  <!-- Pill top glossy highlight -->
  <path d="M39,67 Q54,61 69,67 Q61,64 54,64 Q47,64 39,67 Z" fill="url(#gPillShine)"/>
</svg>
