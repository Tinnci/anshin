<?xml version="1.0" encoding="utf-8"?>
<!--
  MedLog app icon — standard SVG source for PNG export.
  Canvas: 108×108 dp.  Design scale: 0.76 from pivot (54,56) → generous padding.
  Clipboard board: (30,30)–(78,89)  |  Pill: y 64–81
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="108" height="108" viewBox="0 0 108 108">
  <defs>
    <linearGradient id="gBg" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#FAFAFA"/>
      <stop offset="1"   stop-color="#E8E8E8"/>
    </linearGradient>
    <linearGradient id="gBoard" x1="30" y1="30" x2="78" y2="89" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#D8D8D8"/>
      <stop offset="0.6" stop-color="#BBBBBB"/>
      <stop offset="1"   stop-color="#999999"/>
    </linearGradient>
    <linearGradient id="gClip" x1="43.4" y1="22.6" x2="64.6" y2="43.8" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#EEEEEE"/>
      <stop offset="0.35" stop-color="#888888"/>
      <stop offset="0.65" stop-color="#AAAAAA"/>
      <stop offset="1"    stop-color="#D0D0D0"/>
    </linearGradient>
    <linearGradient id="gPillRed" x1="34.2" y1="64.4" x2="54" y2="81.1" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#FFCDD2"/>
      <stop offset="0.45" stop-color="#F44336"/>
      <stop offset="1"    stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="gPillBlue" x1="54" y1="64.4" x2="74" y2="81.1" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#BBDEFB"/>
      <stop offset="0.45" stop-color="#42A5F5"/>
      <stop offset="1"    stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="gPillShine" x1="42.6" y1="59.8" x2="65.4" y2="66.6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.60"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="108" height="108" fill="url(#gBg)"/>

  <!-- Clipboard board (silver rounded rect) -->
  <path d="M29.7,34 Q29.7,30.2 33.5,30.2 L74.5,30.2 Q78.3,30.2 78.3,34 L78.3,86.4 Q78.3,89.4 74.5,89.4 L33.5,89.4 Q29.7,89.4 29.7,86.4 Z"
        fill="url(#gBoard)"/>

  <!-- Back paper (depth shadow) -->
  <rect x="33.5" y="46.1" width="41" height="41.8" fill="#E4E4E4"/>

  <!-- Front paper (white) -->
  <path d="M32,44.6 Q32,43.1 33.5,43.1 L74.5,43.1 Q76.0,43.1 76.0,44.6 L76.0,87.2 L32,87.2 Z" fill="#FFFFFF"/>

  <!-- Red margin line -->
  <rect x="38.8" y="46.1" width="1.1" height="40.3" fill="#FFB3B3"/>

  <!-- Blue ruled lines -->
  <rect x="35" y="51.4" width="38" height="1"   fill="#BBDEFB"/>
  <rect x="35" y="56.8" width="38" height="0.9" fill="#BBDEFB"/>
  <rect x="35" y="62.1" width="38" height="0.9" fill="#BBDEFB"/>

  <!-- DATE label bar -->
  <rect x="41.1" y="48"   width="13.7" height="1.2" fill="#757575"/>
  <!-- DATE value underline -->
  <rect x="56.3" y="48.4" width="9.9"  height="0.8" fill="#CCCCCC"/>

  <!-- PATIENT label bar -->
  <rect x="41.1" y="53"   width="19.7" height="1.1" fill="#757575"/>
  <!-- PATIENT value underline -->
  <rect x="62.4" y="53.3" width="3.8"  height="0.8" fill="#CCCCCC"/>

  <!-- LOG label bar -->
  <rect x="41.1" y="57.9" width="9.9"  height="1.1" fill="#757575"/>

  <!-- AM checkbox -->
  <rect x="64.6" y="46.9" width="3.8" height="3.8" fill="none" stroke="#9E9E9E" stroke-width="0.9"/>
  <!-- AM text bar -->
  <rect x="69.6" y="47.6" width="2.6" height="2.3" fill="#9E9E9E"/>

  <!-- PM checkbox -->
  <rect x="64.6" y="52.2" width="3.8" height="3.8" fill="none" stroke="#9E9E9E" stroke-width="0.9"/>
  <!-- PM text bar -->
  <rect x="69.6" y="53.0" width="2.6" height="2.2" fill="#9E9E9E"/>

  <!-- Metal clip body -->
  <path d="M43.4,24.8 Q43.4,22.6 45.6,22.6 L62.4,22.6 Q64.6,22.6 64.6,24.8 L64.6,43.8 L43.4,43.8 Z"
        fill="url(#gClip)"/>

  <!-- Spring coil details -->
  <rect x="45.6" y="22.6" width="16.8" height="1.1" fill="#555555"/>
  <rect x="46.4" y="23.7" width="15.2" height="1.1" fill="#999999"/>

  <!-- Pill – left red half -->
  <path d="M54,64.4 L42.6,64.4 A8.4,8.4 0 0,0 42.6,81.1 L54,81.1 Z" fill="url(#gPillRed)"/>

  <!-- Pill – right blue half -->
  <path d="M54,64.4 L65.4,64.4 A8.4,8.4 0 0,1 65.4,81.1 L54,81.1 Z" fill="url(#gPillBlue)"/>

  <!-- Pill centre seam (white divider) -->
  <rect x="53.3" y="63.6" width="1.4" height="18.2" fill="#FFFFFF"/>

  <!-- Pill top glossy highlight -->
  <path d="M42.6,64.4 Q54,59.8 65.4,64.4 Q59.3,62.1 54,62.1 Q48.7,62.1 42.6,64.4 Z"
        fill="url(#gPillShine)"/>
</svg>
